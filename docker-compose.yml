version: '3.8'

services:

  # ─── Laravel App (Nginx + PHP-FPM) ───────────────
  app:
    image: '${SERVICE_IMAGE}'        # Coolify fills this from your GitHub build
    restart: always
    environment:
      - SERVICE_FQDN_APP_80          # → app.yourdomain.com
      - APP_MODE=app
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}

      # Database
      - DB_CONNECTION=pgsql
      - DB_HOST=laravel-postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      # Redis
      - REDIS_HOST=laravel-redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis

      # Reverb (WebSockets)
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=${REVERB_HOST}        # ws.yourdomain.com
      - REVERB_PORT=443
      - REVERB_SCHEME=https

    depends_on:
      laravel-postgres:
        condition: service_healthy
      laravel-redis:
        condition: service_healthy
    networks:
      - laravel-net
      - coolify
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- http://127.0.0.1:80/up || exit 1'
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s

  # ─── Queue Worker ────────────────────────────────
  queue:
    image: '${SERVICE_IMAGE}'        # same image, different mode
    restart: always
    environment:
      - APP_MODE=queue
      - APP_ENV=production
      - APP_KEY=${APP_KEY}

      - DB_CONNECTION=pgsql
      - DB_HOST=laravel-postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      - REDIS_HOST=laravel-redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis

    depends_on:
      laravel-postgres:
        condition: service_healthy
      laravel-redis:
        condition: service_healthy
    networks:
      - laravel-net
    # No FQDN needed — queue worker has no public URL

  # ─── Laravel Reverb (WebSockets) ─────────────────
  reverb:
    image: '${SERVICE_IMAGE}'        # same image, different mode
    restart: always
    environment:
      - SERVICE_FQDN_REVERB_8080     # → ws.yourdomain.com
      - APP_MODE=reverb
      - APP_ENV=production
      - APP_KEY=${APP_KEY}

      - DB_CONNECTION=pgsql
      - DB_HOST=laravel-postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      - REDIS_HOST=laravel-redis
      - REDIS_PORT=6379

      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_PORT=8080

    depends_on:
      laravel-postgres:
        condition: service_healthy
      laravel-redis:
        condition: service_healthy
    networks:
      - laravel-net
      - coolify

  # ─── PostgreSQL ───────────────────────────────────
  laravel-postgres:
    image: 'postgres:16-alpine'
    restart: always
    environment:
      - POSTGRES_DB=${DB_DATABASE:-laravel}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - laravel-postgres-data:/var/lib/postgresql/data
    networks:
      - laravel-net
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 20s
      retries: 10

  # ─── Redis ────────────────────────────────────────
  laravel-redis:
    image: 'redis:7-alpine'
    restart: always
    command: "redis-server --appendonly yes"
    volumes:
      - laravel-redis-data:/data
    networks:
      - laravel-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  laravel-postgres-data:
  laravel-redis-data:

networks:
  laravel-net:
    name: laravel-net
    driver: bridge
  coolify:
    external: true